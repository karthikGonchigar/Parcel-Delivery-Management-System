<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update Parcel</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef1f7;
            display: flex;
            justify-content: center;
            padding-top: 60px;
        }

        .box {
            width: 420px;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
            color: #444;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #bbb;
            margin-top: 5px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #6c63ff;
            box-shadow: 0 0 5px rgba(108,99,255,0.4);
            outline: none;
        }

        button {
            width: 100%;
            margin-top: 20px;
            background: #6c63ff;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #5848e5;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Update Your Parcel</h2>

    <form th:action="@{/updateverify}" method="post">

        <label>Parcel ID:</label>
        <input type="number" name="id" 
               th:value="${id}" required>

        <label>Password:</label>
        <input type="password" name="password"
               th:value="${password}" required>

        <p class="error" th:text="${error}"></p>

        <button type="submit">Verify</button>
    </form>

</div>

</body>
</html>
