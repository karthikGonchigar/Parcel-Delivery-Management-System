<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Parcel</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(120deg, #3A1C71, #D76D77, #FFAF7B);
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
        }
	
		p{
		padding :0%;
		color:rgb(8, 231, 247);
		margin:0%;
		}
        .container {
            width: 80%;
            margin: 60px auto;
            padding: 40px;
            border: 2px solid white;
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            backdrop-filter: blur(3px);
        }

        .column {
            width: 45%;
        }

        label {
            display: block;
            margin-bottom: 4px;
            font-size: 15px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 18px;
            border-radius: 6px;
            border: 2px solid white;
            background: transparent !important;
            color: white !important;
            font-size: 16px;
        }

        input::placeholder {
            color: #e2e2e2;
        }

        input:focus {
            background: transparent !important;
            outline: none;
            color: white !important;
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus,
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 50px transparent inset !important;
            -webkit-text-fill-color: white !important;
            background: transparent !important;
            transition: background-color 9999s ease-in-out 0s;
        }

        input[type=datetime-local] {
            color-scheme: dark;
        }

        .btn-container {
            text-align: center;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 25px;
            background: transparent;
            border: 2px solid white;
            border-radius: 20px;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: white;
            color: black;
        }

        h1 {
            text-align: center;
            color: white;
            margin-top: 40px;
            margin-bottom: -20px;
            font-size: 42px;
            font-weight: bold;
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body>

<h1>Book Your Parcel</h1>

<div class="container">
    <form th:action="@{/bookparcel}" method="post" th:object="${parcels}" style="width:100%;">

        <div style="display:flex; justify-content:space-between;">

            <!-- LEFT COLUMN -->
            <div class="column">

                <label>Enter Your Name</label>
                <input type="text" name="name" placeholder="Your Name" th:value="${parcels.name}" >
                <p th:each="e : ${#fields.errors('name')}" th:text="${e}"></p>

                <label>Enter Your Email</label>
                <input type="email" name="email" placeholder="Your Email" th:value="${parcels.email}" >
                <p th:each="e : ${#fields.errors('email')}" th:text="${e}"></p>

                <label>Enter Your Password</label>
                <input type="password" name="password" placeholder="Password" th:value="${parcels.password}" >
                <p th:each="e : ${#fields.errors('password')}" th:text="${e}"></p>

                <label>Enter Your Mobile Number</label>
                <input type="text" name="mobile" placeholder="Mobile Number" th:value="${parcels.mobile}">
                <p th:each="e : ${#fields.errors('mobile')}" th:text="${e}"></p>

                <label>Enter Pickup Date & Time</label>
                <input type="datetime-local" name="pick" th:value="${parcels.pick}" >
                <p th:each="e : ${#fields.errors('pick')}" th:text="${e}"></p>

            </div>

            <!-- RIGHT COLUMN -->
            <div class="column">

                <label>Pick Up Source</label>
                <input type="text" name="source" placeholder="Source" th:value="${parcels.source}" >
                <p th:each="e : ${#fields.errors('source')}" th:text="${e}"></p>

                <label>Destination</label>
                <input type="text" name="destination" placeholder="Destination" th:value="${parcels.destination}">
                <p th:each="e : ${#fields.errors('destination')}" th:text="${e}"></p>

                <label>Enter The Weight (KG)</label>
                <input type="number" name="weight" placeholder="Weight" th:value="${parcels.weight}" >
                <p th:each="e : ${#fields.errors('weight')}" th:text="${e}"></p>

                <label>Enter The Height (Meters)</label>
                <input type="number" name="height" placeholder="Height" th:value="${parcels.height}" >
                <p th:each="e : ${#fields.errors('height')}" th:text="${e}"></p>

                <label>Enter The Width (Meters)</label>
                <input type="number" name="width" placeholder="Width" th:value="${parcels.width}">
                <p th:each="e : ${#fields.errors('width')}" th:text="${e}"></p>

            </div>

        </div>

        <!-- Submit Button at Bottom -->
        <div class="btn-container">
            <button class="btn" type="submit">Book The Parcel</button>
        </div>

    </form>
</div>

</body>
</html>
