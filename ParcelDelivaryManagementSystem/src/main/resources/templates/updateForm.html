<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Parcel</title>

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: #f3f4f6;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: white;
            width: 900px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.12);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #4b4b4b;
            font-size: 26px;
        }

        .row {
            display: flex;
            gap: 30px;
        }

        .left, .right {
            width: 50%;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #6366f1;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #444;
        }

        input {
            width: 60%;
            padding: 12px;
            border: 1px solid #ccc;
            background: #f9fafb;
            border-radius: 10px;
            margin-bottom: 14px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #6366f1;
            background: #fff;
            box-shadow: 0 0 5px rgba(99,102,241,0.3);
            outline: none;
        }

        p {
            color: red;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 10px;
        }

        button {
            width: 60%;
            margin-top: 20px;
            padding: 15px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-left:200px;
        }

        button:hover {
            background: #4f46e5;
        }

    </style>
</head>
<body>

<div class="container">

    <h2>Edit Parcel Details</h2>

    <form th:action="@{/updateparcel}" th:object="${parcels}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="row">

            <!-- LEFT SIDE -->
            <div class="left">

                <label>Name</label>
                <input type="text" th:field="*{name}">
                <p th:errors="*{name}"></p>

                <label>Email</label>
                <input type="email" th:field="*{email}">
                <p th:errors="*{email}"></p>

                <label>Password</label>
                <input type="text" th:field="*{password}">
                <p th:errors="*{password}"></p>

                <label>Mobile</label>
                <input type="text" th:field="*{mobile}">
                <p th:errors="*{mobile}"></p>
                
                 <label>Pickup Date</label>
                <input type="datetime-local" th:field="*{pick}">
                <p th:errors="*{pick}"></p>
                
            </div>


            <!-- RIGHT SIDE -->
            <div class="right">


                <label>Source</label>
                <input type="text" th:field="*{source}">
                <p th:errors="*{source}"></p>

                <label>Destination</label>
                <input type="text" th:field="*{destination}">
                <p th:errors="*{destination}"></p>

                <label>Weight</label>
                <input type="number" th:field="*{weight}">
                <p th:errors="*{weight}"></p>

                <label>Height</label>
                <input type="number" th:field="*{height}">
                <p th:errors="*{height}"></p>

                <label>Width</label>
                <input type="number" th:field="*{width}">
                <p th:errors="*{width}"></p>
            </div>

        </div>

        <button type="submit">Save Changes</button>
    </form>

</div>

</body>
</html>
