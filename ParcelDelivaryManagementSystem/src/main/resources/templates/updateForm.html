<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Parcel</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: #fff;
            width: 450px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            color: #444;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 5px rgba(99,102,241,0.4);
            outline: none;
        }

        p {
            margin: 0;
            margin-top: -8px;
            margin-bottom: 10px;
            font-size: 13px;
            color: red;
        }

        button {
            width: 100%;
            background: #6366f1;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #4f46e5;
        }
    </style>

</head>
<body>

<div class="container">
    <h2>Edit Parcel Details</h2>

    <form th:action="@{/updateparcel}" th:object="${parcels}" method="post">

        <input type="hidden" th:field="*{id}">

        <label>Name</label>
        <input type="text" th:field="*{name}">
        <p th:errors="*{name}"></p>

        <label>Email</label>
        <input type="email" th:field="*{email}">
        <p th:errors="*{email}"></p>

        <label>Password</label>
        <input type="text" th:field="*{password}">
        <p th:errors="*{password}"></p>

        <label>Mobile</label>
        <input type="text" th:field="*{mobile}">
        <p th:errors="*{mobile}"></p>

        <label>Pickup Date</label>
        <input type="datetime-local" th:field="*{pick}">
        <p th:errors="*{pick}"></p>

        <label>Source</label>
        <input type="text" th:field="*{source}">
        <p th:errors="*{source}"></p>

        <label>Destination</label>
        <input type="text" th:field="*{destination}">
        <p th:errors="*{destination}"></p>

        <label>Weight</label>
        <input type="number" th:field="*{weight}">
        <p th:errors="*{weight}"></p>

        <label>Height</label>
        <input type="number" th:field="*{height}">
        <p th:errors="*{height}"></p>

        <label>Width</label>
        <input type="number" th:field="*{width}">
        <p th:errors="*{width}"></p>

        <button type="submit">Save Changes</button>
    </form>
</div>

</body>
</html>
